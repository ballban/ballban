        - **金融投资系统重建 (2022年5月 - 2022年12月)**: 使用 ASP.NET 和 C# 对传统金融报告系统进行现代化改造。通过重构遗留代码库和实现自动化测试脚本来减少技术债务，显著提高了系统可靠性。确保敏感财务记录迁移过程中的数据一致性。
        - **银行系统 OTP 开发 (2021年10月 - 2022年3月)**: 为主要银行系统开发一次性密码（OTP）身份验证功能。在使用 ASP.NET Web Forms 和 Oracle DB 的高安全环境中工作。严格遵守金融机构所需的安全合规标准。

