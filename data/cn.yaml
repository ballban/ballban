        - **企业系统设计与数字化转型项目 (2024年4月 - 2024年10月)**: 负责新 Web 系统的上游设计，替代传统的手工工作流程（基于 Excel），将复杂的业务逻辑转化为功能系统规格。设计数据库架构，解决复杂的数据关系挑战以支持客户的业务流程。定义 RESTful API 规格和系统架构，在客户需求和开发团队之间架起桥梁。管理与离岸开发团队的技术沟通，确保实现严格符合设计标准。

