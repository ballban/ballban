  title: Experience
  items:
    - role: Senior Analyst / Backend Developer
      company: Avanade Inc.
      date: "Dec 2023 - Present"
      location: Tokyo, Japan
      tags: Permanent
      description: |
        - **Internal Data Analytics Platform for Semiconductor Manufacturer (Nov 2024 - Present)**: Developing a statistical data management system to process and visualize complex machine data for manufacturing lines. Rapidly adapted to the Angular framework to implement key UI components for data filtering, visualization, and reporting. Implemented C# Web APIs and SQL Server queries to handle complex business logic and ensure accurate data retrieval.
        - **Enterprise System Design & Digital Transformation Project (Apr 2024 - Oct 2024)**: Led the upstream design for a new web-based system to replace legacy manual workflows (Excel-based), translating complex business logic into functional system specifications. Designed the database schema, solving intricate data relationship challenges to support the client's business processes. Defined RESTful API specifications and system architecture, bridging the gap between client requirements and the development team. Managed technical communication with offshore development teams, ensuring the implementation aligned strictly with the design standards.

    - role: Software Engineer
      company: Growth & Communications Inc.
      date: "Oct 2021 - Nov 2023"
      location: Tokyo, Japan
      tags: Permanent
      description: |
        - **Used Car Trading Platform Development (Jan 2023 - Nov 2023)**: Designed and developed new pages for a Japanese used car trading platform specializing in exporting vehicles internationally. Implemented responsive new pages and optimized features using ASP.NET, C#, SQL Server, and Redis for caching. Configured and managed CI/CD pipelines using Jenkins for automated testing and deployment. Utilized GCP for logging infrastructure and system deployment.
        - **Financial Investment System Rebuild (May 2022 - Dec 2022)**: Modernized legacy financial reporting system using ASP.NET and C#. Reduced technical debt by refactoring legacy codebases and implementing automated testing scripts, significantly improving system reliability. Ensured data consistency during migration of sensitive financial records.
        - **Banking System OTP Development (Oct 2021 - Mar 2022)**: Developed One-Time Password (OTP) authentication features for major banking system. Worked in high-security environment utilizing ASP.NET Web Forms and Oracle DB. Strictly adhered to security compliance standards required for financial institutions.

    - role: Software Engineer
      company: W2 Solution Co., Ltd.
      date: "Dec 2020 - Sep 2021"
      location: Tokyo, Japan
      tags: Permanent
      description: |
        - **E-Commerce Product Development (Dec 2020 - Aug 2021)**: Developed and customized enterprise E-Commerce features using ASP.NET MVC, C#, and SQL Server, covering the full lifecycle from design to deployment.

    - role: Junior Software Engineer
      company: AVAIL Corporation
      date: "Aug 2019 - Nov 2020"
      location: Tokyo, Japan
      tags: Permanent
      description: |
        - **Apparel Management System Development (Aug 2019 - Nov 2020)**: Maintained and customized core business systems using VB.NET and C#. Conducted root cause analysis for data defects and optimized SQL queries.

