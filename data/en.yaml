    Senior Software Engineer with 6+ years of experience specializing in the Microsoft technology stack (C#/.NET).
    - Strong Backend Foundation: Deep expertise in C#, .NET Framework/.NET Core, and SQL Server, delivering mission-critical systems for Fintech and Manufacturing sectors.
    - Cloud-Native Ready: Microsoft Certified: Azure Developer Associate (AZ-204) with a solid conceptual understanding of cloud architecture and hands-on experience in serverless applications.
    - Modern Web Adaptation: Successfully transitioned from legacy ASP.NET to modern Angular/TypeScript environments in recent projects, demonstrating rapid learning capabilities.

experience:
