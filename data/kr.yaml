    Microsoft 기술 스택(C#/.NET) 전문 6년 이상 경력의 시니어 소프트웨어 엔지니어.
    - 탄탄한 백엔드 기반: C#, .NET Framework/.NET Core, SQL Server에 대한 깊은 전문 지식을 보유하고 있으며, Fintech 및 제조업 분야의 미션 크리티컬 시스템을 제공.
    - 클라우드 네이티브 준비: Microsoft Certified: Azure Developer Associate (AZ-204)를 취득하여 클라우드 아키텍처에 대한 확고한 개념적 이해와 서버리스 애플리케이션에 대한 실무 경험 보유.
    - 모던 웹 적응: 최근 프로젝트에서 레거시 ASP.NET에서 모던 Angular/TypeScript 환경으로 성공적으로 전환하여 빠른 학습 능력을 입증.

experience:
  show: true
  order: 2
  title: 경력
  items:
    - role: Senior Analyst / Backend Developer
      company: Avanade Inc.
      date: "2023년 12월 - 현재"
      location: 도쿄, 일본
      tags: 정규직
      description: |
        - **반도체 제조사 내부 데이터 분석 플랫폼 (2024년 11월 - 현재)**: 제조 라인의 복잡한 기계 데이터를 처리하고 시각화하는 통계 데이터 관리 시스템 개발. Angular 프레임워크에 빠르게 적응하여 데이터 필터링, 시각화 및 리포팅을 위한 핵심 UI 컴포넌트를 구현. C# Web API와 SQL Server 쿼리를 구현하여 복잡한 비즈니스 로직을 처리하고 정확한 데이터 검색을 보장.
        - **엔터프라이즈 시스템 설계 및 디지털 트랜스포메이션 프로젝트 (2024년 4월 - 2024년 10월)**: 레거시 수동 워크플로우(Excel 기반)를 대체할 새로운 웹 기반 시스템의 상위 설계를 주도하여 복잡한 비즈니스 로직을 기능적 시스템 사양으로 변환. 데이터베이스 스키마를 설계하고 클라이언트의 비즈니스 프로세스를 지원하기 위한 복잡한 데이터 관계 문제를 해결. RESTful API 사양 및 시스템 아키텍처를 정의하여 클라이언트 요구사항과 개발팀 간의 가교 역할 수행. 오프쇼어 개발팀과의 기술 커뮤니케이션을 관리하여 설계 표준에 엄격히 부합하는 구현을 보장.

    - role: Software Engineer
      company: Growth & Communications Inc.
      date: "2021년 10월 - 2023년 11월"
      location: 도쿄, 일본
      tags: 정규직
      description: |
        - **중고차 거래 플랫폼 개발 (2023년 1월 - 2023년 11월)**: 국제 차량 수출을 전문으로 하는 일본 중고차 거래 플랫폼의 신규 페이지를 설계 및 개발. ASP.NET, C#, SQL Server 및 캐싱을 위한 Redis를 사용하여 반응형 신규 페이지와 최적화된 기능을 구현. Jenkins를 사용하여 CI/CD 파이프라인을 구성 및 관리하여 자동화된 테스트 및 배포를 실현. GCP를 로깅 인프라 및 시스템 배포에 활용.
        - **금융 투자 시스템 재구축 (2022년 5월 - 2022년 12월)**: ASP.NET과 C#을 사용하여 레거시 금융 리포팅 시스템을 현대화. 레거시 코드베이스를 리팩토링하고 자동화된 테스트 스크립트를 구현하여 기술 부채를 줄이고 시스템 신뢰성을 크게 향상. 민감한 금융 기록의 마이그레이션 중 데이터 일관성을 보장.
        - **은행 시스템 OTP 개발 (2021년 10월 - 2022년 3월)**: 주요 은행 시스템의 일회용 비밀번호(OTP) 인증 기능을 개발. ASP.NET Web Forms 및 Oracle DB를 사용하는 높은 보안 환경에서 작업. 금융 기관에 요구되는 보안 규정 표준을 엄격히 준수.

    - role: Software Engineer
      company: W2 Solution Co., Ltd.
      date: "2020년 12월 - 2021년 9월"
      location: 도쿄, 일본
      tags: 정규직
      description: |
        - **전자상거래 제품 개발 (2020년 12월 - 2021년 8월)**: ASP.NET MVC, C# 및 SQL Server를 사용하여 기업용 전자상거래 기능을 개발 및 커스터마이징하여 설계부터 배포까지의 전체 라이프사이클을 커버.

    - role: Junior Software Engineer
      company: AVAIL Corporation
      date: "2019년 8월 - 2020년 11월"
      location: 도쿄, 일본
      tags: 정규직
      description: |
        - **의류 관리 시스템 개발 (2019년 8월 - 2020년 11월)**: VB.NET 및 C#을 사용하여 핵심 비즈니스 시스템을 유지보수 및 커스터마이징. 데이터 결함에 대한 근본 원인 분석을 수행하고 SQL 쿼리를 최적화.

